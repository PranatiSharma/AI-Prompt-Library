<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#2563eb,#4f46e5);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:430px;
            border:none;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,.3);
        }

        .card-header{
            background:transparent;
            border:none;
            text-align:center;
            padding-top:30px;
        }

        .form-control{
            border-radius:12px;
            height:50px;
        }

        .btn{
            border-radius:12px;
            height:50px;
        }

    </style>

</head>

<body>

<div class="card">

    <div class="card-header">

        <i class="fa-solid fa-robot fa-3x text-primary mb-3"></i>

        <h2>AI Prompt Library</h2>

        <p class="text-muted">
            Login to continue
        </p>

    </div>

    <div class="card-body p-4">

        <form th:action="@{/login}"
              method="post">

            <div class="mb-3">

                <label>Email</label>

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter Email">

            </div>

            <div class="mb-4">

                <label>Password</label>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter Password">

            </div>

            <button class="btn btn-primary w-100">

                <i class="fa-solid fa-right-to-bracket"></i>

                Login

            </button>

        </form>

        <hr>

        <div class="text-center">

            Don't have an account?

            <br><br>

            <a href="/register"
               class="btn btn-outline-success">

                Create Account

            </a>

        </div>

    </div>

</div>

</body>

</html>
