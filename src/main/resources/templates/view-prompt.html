<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>View Prompt</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        .card-header{
            background:linear-gradient(90deg,#2563eb,#4f46e5);
            color:white;
            border-radius:20px 20px 0 0 !important;
        }

        .content-box{
            background:#f8f9fa;
            border-radius:15px;
            padding:20px;
            min-height:250px;
            white-space:pre-wrap;
            font-size:16px;
            line-height:1.7;
        }

        .btn{
            border-radius:12px;
        }

        .badge{
            font-size:15px;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-9">

            <div class="card">

                <div class="card-header d-flex justify-content-between align-items-center">

                    <h2>

                        <i class="fa-solid fa-eye"></i>

                        Prompt Details

                    </h2>

                    <span class="badge bg-warning text-dark"
                          th:text="${prompt.category}">
                    </span>

                </div>

                <div class="card-body">

                    <h3 class="fw-bold mb-4"
                        th:text="${prompt.title}">
                    </h3>

                    <div class="content-box"
                         th:text="${prompt.content}">
                    </div>

                    <div class="mt-4 d-flex justify-content-between">

                        <a href="/prompts"
                           class="btn btn-secondary">

                            <i class="fa-solid fa-arrow-left"></i>

                            Back

                        </a>

                        <div>

                            <a th:href="@{/prompts/edit/{id}(id=${prompt.id})}"
                               class="btn btn-warning">

                                <i class="fa-solid fa-pen"></i>

                                Edit

                            </a>

                            <a th:href="@{/prompts/delete/{id}(id=${prompt.id})}"
                               class="btn btn-danger"
                               onclick="return confirm('Delete this prompt?');">

                                <i class="fa-solid fa-trash"></i>

                                Delete

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
