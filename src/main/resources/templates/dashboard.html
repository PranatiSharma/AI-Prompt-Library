<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
        }

        .dashboard-card{
            border:none;
            border-radius:18px;
            transition:.3s;
            box-shadow:0 8px 20px rgba(0,0,0,.08);
        }

        .dashboard-card:hover{
            transform:translateY(-6px);
        }

        .header{
            background:linear-gradient(90deg,#4f46e5,#2563eb);
            color:white;
            padding:25px;
            border-radius:20px;
            margin-bottom:35px;
        }

        .count{
            font-size:42px;
            font-weight:bold;
        }

        .btn{
            border-radius:12px;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="header text-center">

        <h1>
            🤖 AI Prompt Library Dashboard
        </h1>

        <p class="mb-0">
            Welcome Back!
        </p>

    </div>

    <div class="row g-4">

        <div class="col-lg-3 col-md-6">

            <div class="card dashboard-card bg-primary text-white">

                <div class="card-body text-center">

                    <i class="fa-solid fa-folder fa-2x mb-3"></i>

                    <h5>Total Prompts</h5>

                    <div class="count"
                         th:text="${totalPrompts}"></div>

                </div>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="card dashboard-card bg-success text-white">

                <div class="card-body text-center">

                    <i class="fa-solid fa-code fa-2x mb-3"></i>

                    <h5>Programming</h5>

                    <div class="count"
                         th:text="${programmingCount}"></div>

                </div>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="card dashboard-card bg-warning">

                <div class="card-body text-center">

                    <i class="fa-solid fa-leaf fa-2x mb-3"></i>

                    <h5>Spring Boot</h5>

                    <div class="count"
                         th:text="${springBootCount}"></div>

                </div>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="card dashboard-card bg-info text-white">

                <div class="card-body text-center">

                    <i class="fa-solid fa-robot fa-2x mb-3"></i>

                    <h5>AI</h5>

                    <div class="count"
                         th:text="${aiCount}"></div>

                </div>

            </div>

        </div>

        <div class="col-lg-4 col-md-6">

            <div class="card dashboard-card bg-secondary text-white">

                <div class="card-body text-center">

                    <i class="fa-solid fa-database fa-2x mb-3"></i>

                    <h5>Database</h5>

                    <div class="count"
                         th:text="${databaseCount}"></div>

                </div>

            </div>

        </div>

        <div class="col-lg-4 col-md-6">

            <div class="card dashboard-card bg-danger text-white">

                <div class="card-body text-center">

                    <i class="fa-solid fa-briefcase fa-2x mb-3"></i>

                    <h5>Career</h5>

                    <div class="count"
                         th:text="${careerCount}"></div>

                </div>

            </div>

        </div>

        <div class="col-lg-4 col-md-12">

            <div class="card dashboard-card bg-dark text-white">

                <div class="card-body text-center">

                    <i class="fa-solid fa-book fa-2x mb-3"></i>

                    <h5>Library</h5>

                    <div class="count"
                         th:text="${libraryCount}"></div>

                </div>

            </div>

        </div>

    </div>

    <div class="text-center mt-5">

        <a href="/prompts/add"
           class="btn btn-success btn-lg px-4">

            <i class="fa-solid fa-plus"></i>

            Add Prompt

        </a>

        <a href="/prompts"
           class="btn btn-primary btn-lg px-4">

            <i class="fa-solid fa-list"></i>

            View Prompts

        </a>

        <form th:action="@{/logout}"
              method="post"
              style="display:inline;">

            <button class="btn btn-danger btn-lg px-4">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </button>

        </form>

    </div>

</div>

</body>

</html>
